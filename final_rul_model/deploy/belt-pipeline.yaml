apiVersion: numaflow.numaproj.io/v1alpha1
kind: Pipeline
metadata:
  name: belt-stream
  namespace: default
spec:
  interStepBufferServiceName: default-isb
  vertices:
    - name: kafka-source
      source:
        kafka:
          brokers:
            - kafka.kafka.svc.cluster.local:9092
          topic: belt-data
          consumerGroup: belt-ml-group
        transformer:
          container:
            image: final-rul-model:latest
            imagePullPolicy: IfNotPresent
            args: ["python", "app/source_transformer.py"]
            env:
              - name: PYTHONUNBUFFERED
                value: "1"
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "300m"
                memory: "256Mi"
      scale:
        min: 1
        max: 1

    - name: ml-runtime
      volumes:
        - name: thresholds-config
          configMap:
            name: belt-thresholds
      udf:
        container:
          image: final-rul-model:latest
          imagePullPolicy: IfNotPresent
          args: ["python", "app/udf_entry.py"]
          env:
            - name: THRESHOLDS_PATH
              value: "/config/thresholds.json"
            - name: MODEL_DIR
              value: "/app/models/saved_models"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          volumeMounts:
            - name: thresholds-config
              mountPath: /config
              readOnly: true
      scale:
        min: 1
        max: 1

    - name: kafka-output
      sink:
        kafka:
          brokers:
            - kafka.kafka.svc.cluster.local:9092
          topic: belt-predictions
  edges:
    - from: kafka-source
      to: ml-runtime
    - from: ml-runtime
      to: kafka-output